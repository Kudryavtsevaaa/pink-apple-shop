<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff6b81" />
    <title>Нет сети — Розовое яблоко</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #fff5f7 0%, #fecfef 100%);
        color: #333;
        padding: 24px;
      }
      .card {
        max-width: 400px;
        text-align: center;
        background: #fff;
        padding: 40px 32px;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 12px;
        color: #ff6b81;
      }
      p {
        margin: 0 0 24px;
        line-height: 1.5;
        color: #666;
      }
      button {
        padding: 12px 28px;
        background: linear-gradient(135deg, #ff9a9e 0%, #ff6b81 100%);
        color: #fff;
        border: none;
        border-radius: 24px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Нет подключения к интернету</h1>
      <p>
        Проверьте сеть и попробуйте снова. Ранее просмотренные страницы могут
        открываться без интернета.
      </p>
      <button type="button" onclick="window.location.reload()">Повторить</button>
    </div>
  </body>
</html>
